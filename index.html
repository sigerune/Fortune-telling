            const total = year + month + day;
            return MYTHICAL_CREATURES[total % MYTHICAL_CREATURES.length];
        }

            const emotionIndex = (month + day) % 4;
            const emotions = ['joy', 'anger', 'sorrow', 'calm'];
            return creature.emotions[emotions[emotionIndex]];
        }

                const isActive = emotion.label === emo.label ? '' : 'opacity: 0.5;';
                resultsHTML += `
                    <div class="trait-item" style="border-left: 4px solid ${creature.color}; ${isActive}">
                        <div class="trait-label" style="color: ${creature.color}">${emo.label}</div>
                        <p style="margin: 0;">${emo.desc}</p>
                    </div>
                `;
            });

            resultsHTML += `
                    </div>
                </div>

                <div class="position-grid">
                    <div class="position-card" style="border-top: 4px solid ${creature.color}; ${!isUpright ? 'opacity: 0.5;' : ''}">
                        <h3 style="color: ${creature.color}">正位置</h3>
                        <p><strong>意味:</strong> ${creature.upright.meaning}</p>
                        <p><strong>側面:</strong> ${creature.upright.aspect}</p>
                        <p><strong>ア:</strong> ${creature.upright.advice}</p>
                    </div>
                    <div class="position-card" style="border-top: 4px solid ${creature.color}; ${isUpright ? 'opacity: 0.5;' : ''}">
                        <h3 style="color: ${creature.color}">逆位置</h3>
                        <p><strong>意味:</strong> ${creature.reversed.meaning}</p>
                        <p><strong>側面:</strong> ${creature.reversed.aspect}</p>
                        <p><strong>ア:</strong> ${creature.reversed.advice}</p>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <button class="reset-button" onclick="location.reload()">別の運命を読む</button>
                    <button class="reset-button" onclick="shareToX('${creature.name}', '${creature.emoji}', '${isUpright ? '正位置' : '逆位置'}')">
                        🐦 Xでシェア
                    </button>
                </div>
            `;

            const resultsSection = document.getElementById('results-section');
            resultsSection.innerHTML = resultsHTML;
            resultsSection.classList.remove('hidden');
        });

        // Share to X function
        function shareToX(creatureName, emoji, position) {
            const text = `${emoji}幻獣占いで『${creatureName}』が出ました！\n${position}\n\nあなたの幻獣は何でしょう？🐉`;
            const url = encodeURIComponent(text);
            const xUrl = `https://x.com/intent/tweet?text=${url}`;
            window.open(xUrl, '_blank');
        }
    </script>
</body>
</html>
